services:
  ppb-mcp:
    build: .
    image: ppb-mcp:latest
    container_name: ppb-mcp
    restart: unless-stopped
    ports:
      - "0.0.0.0:9933:9933"
    environment:
      - HF_DATASET=paulplee/ppb-results
      - REFRESH_INTERVAL_HOURS=1
      - MCP_TRANSPORT=streamable-http
      - HOST=0.0.0.0
      - PORT=9933
      - LOG_LEVEL=INFO
    volumes:
      - hf-cache:/data/huggingface
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://0.0.0.0:9933/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 300s

volumes:
  hf-cache:
