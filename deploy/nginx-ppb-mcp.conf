# /etc/nginx/sites-available/ppb-mcp.conf
# Reverse proxy for ppb-mcp at https://mcp.poorpaul.dev/
# - Streams MCP traffic with no buffering
# - Long timeouts for streamable-http SSE-style responses
# - TLS via certbot (managed separately)

server {
    listen 80;
    listen [::]:80;
    server_name mcp.poorpaul.dev;

    # Redirect to HTTPS (certbot will fill in / replace this block as needed)
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name mcp.poorpaul.dev;

    # ssl_certificate /etc/letsencrypt/live/mcp.poorpaul.dev/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/mcp.poorpaul.dev/privkey.pem;
    # include /etc/letsencrypt/options-ssl-nginx.conf;
    # ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 4m;

    # Health endpoint (optional public exposure)
    location = /health {
        proxy_pass http://127.0.0.1:8000/health;
        proxy_http_version 1.1;
    }

    # MCP streamable HTTP endpoint
    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Streaming-friendly: disable buffering, raise timeouts
        proxy_buffering off;
        proxy_cache off;
        proxy_request_buffering off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;

        # Allow upgrade headers (FastMCP uses HTTP streaming, not WebSockets,
        # but be permissive for future transports)
        proxy_set_header Connection "";
    }
}
