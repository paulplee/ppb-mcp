# /etc/nginx/sites-available/ppb-mcp.conf
# Reverse proxy for ppb-mcp at https://mcp.poorpaul.dev/
# - Streams MCP traffic with no buffering
# - Long timeouts for streamable-http SSE-style responses
# - REST API routes (/api/v1/) with caching + rate limiting
# - TLS via certbot (managed separately)

# Rate limiting: 30 req/min per IP for data endpoints, 120/min for summary
limit_req_zone $binary_remote_addr zone=ppb_data:10m rate=30r/m;
limit_req_zone $binary_remote_addr zone=ppb_summary:10m rate=120r/m;

server {
    listen 80;
    listen [::]:80;
    server_name mcp.poorpaul.dev;

    # Redirect to HTTPS (certbot will fill in / replace this block as needed)
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name mcp.poorpaul.dev;

    # ssl_certificate /etc/letsencrypt/live/mcp.poorpaul.dev/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/mcp.poorpaul.dev/privkey.pem;
    # include /etc/letsencrypt/options-ssl-nginx.conf;
    # ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 4m;

    # Health endpoint
    location = /health {
        proxy_pass http://0.0.0.0:9933/health;
        proxy_http_version 1.1;
        add_header Cache-Control "public, max-age=30";
    }

    # REST API — summary (higher rate limit, cheap query)
    location = /api/v1/summary {
        limit_req zone=ppb_summary burst=20 nodelay;
        proxy_pass http://0.0.0.0:9933/api/v1/summary;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        add_header Cache-Control "public, max-age=60";
    }

    # REST API — data endpoints (rate limited)
    location /api/v1/ {
        limit_req zone=ppb_data burst=10 nodelay;
        proxy_pass http://0.0.0.0:9933;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_cache off;
        add_header Cache-Control "public, max-age=60";
    }

    # MCP streamable HTTP endpoint
    location / {
        proxy_pass http://0.0.0.0:9933;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Streaming-friendly: disable buffering, raise timeouts
        proxy_buffering off;
        proxy_cache off;
        proxy_request_buffering off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;

        # Allow upgrade headers (FastMCP uses HTTP streaming, not WebSockets,
        # but be permissive for future transports)
        proxy_set_header Connection "";
    }
}
